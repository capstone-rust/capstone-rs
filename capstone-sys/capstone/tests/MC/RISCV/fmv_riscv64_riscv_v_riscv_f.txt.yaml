test_cases:
  -
    input:
      bytes: [ 0x57, 0x54, 0x05, 0x5e ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV64", "CS_MODE_RISCV_V", "CS_MODE_RISCV_F" ]
    expected:
      insns:
        -
          asm_text: "vfmv.v.f v8, fa0"

  -
    input:
      bytes: [ 0x57, 0x15, 0x40, 0x42 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV64", "CS_MODE_RISCV_V", "CS_MODE_RISCV_F" ]
    expected:
      insns:
        -
          asm_text: "vfmv.f.s fa0, v4"

  -
    input:
      bytes: [ 0x57, 0x54, 0x05, 0x42 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV64", "CS_MODE_RISCV_V", "CS_MODE_RISCV_F" ]
    expected:
      insns:
        -
          asm_text: "vfmv.s.f v8, fa0"
