test_cases:
  -
    input:
      bytes: [ 0x73, 0x10, 0x30, 0x14 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV32", "CS_OPT_SYNTAX_NO_ALIAS_TEXT" ]
    expected:
      insns:
        -
          asm_text: "csrrw zero, stval, zero"

  -
    input:
      bytes: [ 0x73, 0x10, 0x30, 0x34 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV32", "CS_OPT_SYNTAX_NO_ALIAS_TEXT" ]
    expected:
      insns:
        -
          asm_text: "csrrw zero, mtval, zero"

  -
    input:
      bytes: [ 0x73, 0x10, 0x00, 0x18 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV32", "CS_OPT_SYNTAX_NO_ALIAS_TEXT" ]
    expected:
      insns:
        -
          asm_text: "csrrw zero, satp, zero"
