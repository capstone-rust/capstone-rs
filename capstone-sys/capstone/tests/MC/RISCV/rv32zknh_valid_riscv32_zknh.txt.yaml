test_cases:
  -
    input:
      bytes: [ 0x13, 0x95, 0x25, 0x10 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV32", "zknh" ]
    expected:
      insns:
        -
          asm_text: "sha256sig0 a0, a1"

  -
    input:
      bytes: [ 0x13, 0x95, 0x35, 0x10 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV32", "zknh" ]
    expected:
      insns:
        -
          asm_text: "sha256sig1 a0, a1"

  -
    input:
      bytes: [ 0x13, 0x95, 0x05, 0x10 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV32", "zknh" ]
    expected:
      insns:
        -
          asm_text: "sha256sum0 a0, a1"

  -
    input:
      bytes: [ 0x13, 0x95, 0x15, 0x10 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV32", "zknh" ]
    expected:
      insns:
        -
          asm_text: "sha256sum1 a0, a1"
