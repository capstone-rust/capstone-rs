      options: [ "CS_MODE_RISCV64", "CS_MODE_RISCV_A", "CS_OPT_SYNTAX_NO_ALIAS_TEXT" ]
    expected:
      insns:
        -
          asm_text: "lr.d.aqrl t3, (t4)"

  -
    input:
      bytes: [ 0xaf, 0xbf, 0xee, 0x19 ]
