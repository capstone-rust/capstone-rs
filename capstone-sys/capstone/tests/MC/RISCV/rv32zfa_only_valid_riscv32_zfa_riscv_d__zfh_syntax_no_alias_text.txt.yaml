test_cases:
  -
    input:
      bytes: [ 0xd3, 0x85, 0x14, 0xe2 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV32", "zfa", "CS_MODE_RISCV_D", "+zfh", "CS_OPT_SYNTAX_NO_ALIAS_TEXT" ]
    expected:
      insns:
        -
          asm_text: "fmvh.x.d a1, fs1"

  -
    input:
      bytes: [ 0xd3, 0x84, 0xc5, 0xb2 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV32", "zfa", "CS_MODE_RISCV_D", "+zfh", "CS_OPT_SYNTAX_NO_ALIAS_TEXT" ]
    expected:
      insns:
        -
          asm_text: "fmvp.d.x fs1, a1, a2"
