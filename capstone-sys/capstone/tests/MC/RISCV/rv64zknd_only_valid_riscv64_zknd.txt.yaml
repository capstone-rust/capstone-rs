test_cases:
  -
    input:
      bytes: [ 0x33, 0x85, 0xc5, 0x3a ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV64", "zknd" ]
    expected:
      insns:
        -
          asm_text: "aes64ds a0, a1, a2"

  -
    input:
      bytes: [ 0x33, 0x85, 0xc5, 0x3e ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV64", "zknd" ]
    expected:
      insns:
        -
          asm_text: "aes64dsm a0, a1, a2"

  -
    input:
      bytes: [ 0x13, 0x95, 0x05, 0x30 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV64", "zknd" ]
    expected:
      insns:
        -
          asm_text: "aes64im a0, a1"

  -
    input:
      bytes: [ 0x13, 0x95, 0x55, 0x31 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV64", "zknd" ]
    expected:
      insns:
        -
          asm_text: "aes64ks1i a0, a1, 5"

  -
    input:
      bytes: [ 0x33, 0x85, 0xc5, 0x7e ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV64", "zknd" ]
    expected:
      insns:
        -
          asm_text: "aes64ks2 a0, a1, a2"
