      bytes: [ 0x2f, 0xb0, 0x05, 0x2a ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV32", "experimental-zacas", "CS_OPT_SYNTAX_NO_ALIAS_TEXT" ]
    expected:
      insns:
        -
          asm_text: "amocas.d.rl zero, zero, (a1)"

  -
    input:
      bytes: [ 0x2f, 0xb0, 0x05, 0x2e ]
