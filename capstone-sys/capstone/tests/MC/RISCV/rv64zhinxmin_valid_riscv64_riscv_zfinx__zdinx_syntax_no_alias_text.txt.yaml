test_cases:
  -
    input:
      bytes: [ 0x53, 0x05, 0x26, 0x42 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV64", "CS_MODE_RISCV_ZFINX", "+zdinx", "CS_OPT_SYNTAX_NO_ALIAS_TEXT" ]
    expected:
      insns:
        -
          asm_text: "fcvt.d.h a0, a2"

  -
    input:
      bytes: [ 0x53, 0x35, 0x26, 0x42 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV64", "CS_MODE_RISCV_ZFINX", "+zdinx", "CS_OPT_SYNTAX_NO_ALIAS_TEXT" ]
    expected:
      insns:
        -
          asm_text: "fcvt.d.h a0, a2, rup"

  -
    input:
      bytes: [ 0x53, 0x75, 0x16, 0x44 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV64", "CS_MODE_RISCV_ZFINX", "+zdinx", "CS_OPT_SYNTAX_NO_ALIAS_TEXT" ]
    expected:
      insns:
        -
          asm_text: "fcvt.h.d a0, a2, dyn"
