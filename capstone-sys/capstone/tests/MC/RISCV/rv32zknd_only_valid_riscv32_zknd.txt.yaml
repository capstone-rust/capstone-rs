test_cases:
  -
    input:
      bytes: [ 0x33, 0x85, 0xc5, 0xea ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV32", "zknd" ]
    expected:
      insns:
        -
          asm_text: "aes32dsi a0, a1, a2, 3"

  -
    input:
      bytes: [ 0x33, 0x85, 0xc5, 0xee ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV32", "zknd" ]
    expected:
      insns:
        -
          asm_text: "aes32dsmi a0, a1, a2, 3"
