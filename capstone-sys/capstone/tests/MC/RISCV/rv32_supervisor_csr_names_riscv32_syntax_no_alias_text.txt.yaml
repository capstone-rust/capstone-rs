test_cases:
  -
    input:
      bytes: [ 0x73, 0x23, 0xd0, 0x15 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV32", "CS_OPT_SYNTAX_NO_ALIAS_TEXT" ]
    expected:
      insns:
        -
          asm_text: "csrrs t1, stimecmph, zero"

  -
    input:
      bytes: [ 0xf3, 0x23, 0xd0, 0x15 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV32", "CS_OPT_SYNTAX_NO_ALIAS_TEXT" ]
    expected:
      insns:
        -
          asm_text: "csrrs t2, stimecmph, zero"

  -
    input:
      bytes: [ 0x73, 0x23, 0x40, 0x11 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV32", "CS_OPT_SYNTAX_NO_ALIAS_TEXT" ]
    expected:
      insns:
        -
          asm_text: "csrrs t1, sieh, zero"

  -
    input:
      bytes: [ 0xf3, 0x23, 0x40, 0x11 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV32", "CS_OPT_SYNTAX_NO_ALIAS_TEXT" ]
    expected:
      insns:
        -
          asm_text: "csrrs t2, sieh, zero"

  -
    input:
      bytes: [ 0x73, 0x23, 0x40, 0x15 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV32", "CS_OPT_SYNTAX_NO_ALIAS_TEXT" ]
    expected:
      insns:
        -
          asm_text: "csrrs t1, siph, zero"

  -
    input:
      bytes: [ 0xf3, 0x23, 0x40, 0x15 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV32", "CS_OPT_SYNTAX_NO_ALIAS_TEXT" ]
    expected:
      insns:
        -
          asm_text: "csrrs t2, siph, zero"
