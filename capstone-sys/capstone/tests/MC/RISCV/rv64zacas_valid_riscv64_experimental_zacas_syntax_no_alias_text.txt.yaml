      options: [ "CS_MODE_RISCV64", "experimental-zacas", "CS_OPT_SYNTAX_NO_ALIAS_TEXT" ]
    expected:
      insns:
        -
          asm_text: "amocas.q.rl zero, zero, (a1)"

