test_cases:
  -
    input:
      bytes: [ 0xaf, 0xb5, 0xd7, 0x28 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV64", "experimental-zacas", "CS_OPT_SYNTAX_NO_ALIAS_TEXT" ]
    expected:
      insns:
        -
          asm_text: "amocas.d a1, a3, (a5)"

  -
    input:
      bytes: [ 0xaf, 0xb5, 0xd7, 0x2c ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV64", "experimental-zacas", "CS_OPT_SYNTAX_NO_ALIAS_TEXT" ]
    expected:
      insns:
        -
          asm_text: "amocas.d.aq a1, a3, (a5)"

  -
    input:
      bytes: [ 0xaf, 0xb5, 0xd7, 0x2a ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV64", "experimental-zacas", "CS_OPT_SYNTAX_NO_ALIAS_TEXT" ]
    expected:
      insns:
        -
          asm_text: "amocas.d.rl a1, a3, (a5)"

