test_cases:
  -
    input:
      bytes: [ 0xb3, 0x22, 0x73, 0x20 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV32", "CS_MODE_RISCV_ZBA" ]
    expected:
      insns:
        -
          asm_text: "sh1add t0, t1, t2"

  -
    input:
      bytes: [ 0xb3, 0x42, 0x73, 0x20 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV32", "CS_MODE_RISCV_ZBA" ]
    expected:
      insns:
        -
          asm_text: "sh2add t0, t1, t2"

  -
    input:
      bytes: [ 0xb3, 0x62, 0x73, 0x20 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV32", "CS_MODE_RISCV_ZBA" ]
    expected:
      insns:
        -
          asm_text: "sh3add t0, t1, t2"
