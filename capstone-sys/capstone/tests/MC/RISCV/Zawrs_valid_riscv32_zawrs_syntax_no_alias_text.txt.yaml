test_cases:
  -
    input:
      bytes: [ 0x73, 0x00, 0xd0, 0x00 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV32", "zawrs", "CS_OPT_SYNTAX_NO_ALIAS_TEXT" ]
    expected:
      insns:
        -
          asm_text: "wrs.nto"

  -
    input:
      bytes: [ 0x73, 0x00, 0xd0, 0x01 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV32", "zawrs", "CS_OPT_SYNTAX_NO_ALIAS_TEXT" ]
    expected:
      insns:
        -
          asm_text: "wrs.sto"
