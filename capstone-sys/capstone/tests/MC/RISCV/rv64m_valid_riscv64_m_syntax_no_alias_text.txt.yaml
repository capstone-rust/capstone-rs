test_cases:
  -
    input:
      bytes: [ 0xbb, 0x00, 0x31, 0x02 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV64", "m", "CS_OPT_SYNTAX_NO_ALIAS_TEXT" ]
    expected:
      insns:
        -
          asm_text: "mulw ra, sp, gp"

  -
    input:
      bytes: [ 0x3b, 0xc2, 0x62, 0x02 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV64", "m", "CS_OPT_SYNTAX_NO_ALIAS_TEXT" ]
    expected:
      insns:
        -
          asm_text: "divw tp, t0, t1"

  -
    input:
      bytes: [ 0xbb, 0x53, 0x24, 0x03 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV64", "m", "CS_OPT_SYNTAX_NO_ALIAS_TEXT" ]
    expected:
      insns:
        -
          asm_text: "divuw t2, s0, s2"

  -
    input:
      bytes: [ 0x3b, 0xe5, 0xc5, 0x02 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV64", "m", "CS_OPT_SYNTAX_NO_ALIAS_TEXT" ]
    expected:
      insns:
        -
          asm_text: "remw a0, a1, a2"

  -
    input:
      bytes: [ 0xbb, 0x76, 0xf7, 0x02 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV64", "m", "CS_OPT_SYNTAX_NO_ALIAS_TEXT" ]
    expected:
      insns:
        -
          asm_text: "remuw a3, a4, a5"
