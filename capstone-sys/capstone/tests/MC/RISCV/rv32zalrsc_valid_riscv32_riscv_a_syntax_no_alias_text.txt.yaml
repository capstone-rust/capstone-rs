test_cases:
  -
    input:
      bytes: [ 0xaf, 0x22, 0x03, 0x10 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV32", "CS_MODE_RISCV_A", "CS_OPT_SYNTAX_NO_ALIAS_TEXT" ]
    expected:
      insns:
        -
          asm_text: "lr.w t0, (t1)"

  -
    input:
      bytes: [ 0x2f, 0xa3, 0x03, 0x14 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV32", "CS_MODE_RISCV_A", "CS_OPT_SYNTAX_NO_ALIAS_TEXT" ]
    expected:
      insns:
        -
          asm_text: "lr.w.aq t1, (t2)"

  -
    input:
      bytes: [ 0xaf, 0x23, 0x0e, 0x12 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV32", "CS_MODE_RISCV_A", "CS_OPT_SYNTAX_NO_ALIAS_TEXT" ]
    expected:
      insns:
        -
          asm_text: "lr.w.rl t2, (t3)"

  -
    input:
      bytes: [ 0x2f, 0xae, 0x0e, 0x16 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV32", "CS_MODE_RISCV_A", "CS_OPT_SYNTAX_NO_ALIAS_TEXT" ]
    expected:
      insns:
        -
          asm_text: "lr.w.aqrl t3, (t4)"

  -
    input:
      bytes: [ 0xaf, 0xaf, 0xee, 0x19 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV32", "CS_MODE_RISCV_A", "CS_OPT_SYNTAX_NO_ALIAS_TEXT" ]
    expected:
      insns:
        -
          asm_text: "sc.w t6, t5, (t4)"

  -
    input:
      bytes: [ 0x2f, 0x2f, 0xde, 0x1d ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV32", "CS_MODE_RISCV_A", "CS_OPT_SYNTAX_NO_ALIAS_TEXT" ]
    expected:
      insns:
        -
          asm_text: "sc.w.aq t5, t4, (t3)"

  -
    input:
      bytes: [ 0xaf, 0xae, 0xc3, 0x1b ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV32", "CS_MODE_RISCV_A", "CS_OPT_SYNTAX_NO_ALIAS_TEXT" ]
    expected:
      insns:
        -
          asm_text: "sc.w.rl t4, t3, (t2)"

  -
    input:
      bytes: [ 0x2f, 0x2e, 0x73, 0x1e ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV32", "CS_MODE_RISCV_A", "CS_OPT_SYNTAX_NO_ALIAS_TEXT" ]
    expected:
      insns:
        -
          asm_text: "sc.w.aqrl t3, t2, (t1)"
