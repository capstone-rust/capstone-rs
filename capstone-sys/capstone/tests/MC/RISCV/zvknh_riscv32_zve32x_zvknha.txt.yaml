test_cases:
  -
    input:
      bytes: [ 0x77, 0x25, 0x94, 0xb6 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV32", "zve32x", "zvknha" ]
    expected:
      insns:
        -
          asm_text: "vsha2ms.vv v10, v9, v8"

  -
    input:
      bytes: [ 0x77, 0x25, 0x94, 0xba ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV32", "zve32x", "zvknha" ]
    expected:
      insns:
        -
          asm_text: "vsha2ch.vv v10, v9, v8"

  -
    input:
      bytes: [ 0x77, 0x25, 0x94, 0xbe ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV32", "zve32x", "zvknha" ]
    expected:
      insns:
        -
          asm_text: "vsha2cl.vv v10, v9, v8"
