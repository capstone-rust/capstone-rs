test_cases:
  -
    input:
      bytes: [ 0x13, 0x85, 0xf5, 0xff ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV32", "CS_OPT_SYNTAX_NO_ALIAS_TEXT" ]
    expected:
      insns:
        -
          asm_text: "addi a0, a1, -1"

  -
    input:
      bytes: [ 0x13, 0xe6, 0x06, 0x80 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV32", "CS_OPT_SYNTAX_NO_ALIAS_TEXT" ]
    expected:
      insns:
        -
          asm_text: "ori a2, a3, -2048"

  -
    input:
      bytes: [ 0x83, 0x25, 0xb6, 0x9a ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV32", "CS_OPT_SYNTAX_NO_ALIAS_TEXT" ]
    expected:
      insns:
        -
          asm_text: "lw a1, -1621(a2)"

  -
    input:
      bytes: [ 0x23, 0x2c, 0xb6, 0xfe ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV32", "CS_OPT_SYNTAX_NO_ALIAS_TEXT" ]
    expected:
      insns:
        -
          asm_text: "sw a1, -8(a2)"
