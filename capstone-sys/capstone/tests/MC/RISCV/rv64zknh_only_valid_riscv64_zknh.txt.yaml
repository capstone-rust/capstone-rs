test_cases:
  -
    input:
      bytes: [ 0x13, 0x95, 0x65, 0x10 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV64", "zknh" ]
    expected:
      insns:
        -
          asm_text: "sha512sig0 a0, a1"

  -
    input:
      bytes: [ 0x13, 0x95, 0x75, 0x10 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV64", "zknh" ]
    expected:
      insns:
        -
          asm_text: "sha512sig1 a0, a1"

  -
    input:
      bytes: [ 0x13, 0x95, 0x45, 0x10 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV64", "zknh" ]
    expected:
      insns:
        -
          asm_text: "sha512sum0 a0, a1"

  -
    input:
      bytes: [ 0x13, 0x95, 0x55, 0x10 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV64", "zknh" ]
    expected:
      insns:
        -
          asm_text: "sha512sum1 a0, a1"
