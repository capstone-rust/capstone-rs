test_cases:
  -
    input:
      bytes: [ 0x53, 0x75, 0x20, 0xc4 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV64", "zfh", "CS_OPT_SYNTAX_NO_ALIAS_TEXT" ]
    expected:
      insns:
        -
          asm_text: "fcvt.l.h a0, ft0, dyn"

