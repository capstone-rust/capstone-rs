      bytes: [ 0x81, 0x60 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV32", "CS_MODE_RISCV_EXPERIMENTAL_ZICFISS", "+experimental-zcmop", "CS_OPT_SYNTAX_NO_ALIAS_TEXT" ]
    expected:
      insns:
