test_cases:
  -
    input:
      bytes: [ 0x57, 0x25, 0x94, 0x32 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV32", "zve64x", "zvbc" ]
    expected:
      insns:
        -
          asm_text: "vclmul.vv v10, v9, v8"

  -
    input:
      bytes: [ 0x57, 0x65, 0x95, 0x32 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV32", "zve64x", "zvbc" ]
    expected:
      insns:
        -
          asm_text: "vclmul.vx v10, v9, a0"

  -
    input:
      bytes: [ 0x57, 0x25, 0x94, 0x36 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV32", "zve64x", "zvbc" ]
    expected:
      insns:
        -
          asm_text: "vclmulh.vv v10, v9, v8"

  -
    input:
      bytes: [ 0x57, 0x65, 0x95, 0x36 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV32", "zve64x", "zvbc" ]
    expected:
      insns:
        -
          asm_text: "vclmulh.vx v10, v9, a0"
