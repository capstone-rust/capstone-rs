test_cases:
  -
    input:
      bytes: [ 0x13, 0x85, 0x05, 0x00 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV32" ]
    expected:
      insns:
        -
          asm_text: "mv a0, a1"

  -
    input:
      bytes: [ 0x13, 0x04, 0xc1, 0x3f ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV32" ]
    expected:
      insns:
        -
          asm_text: "addi s0, sp, 1020"

  -
    input:
      bytes: [ 0x2e, 0x85 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV32" ]
    expected:
      insns:
        -
          asm_text: "mv a0, a1"

  -
    input:
      bytes: [ 0xe0, 0x1f ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV32" ]
    expected:
      insns:
        -
          asm_text: "addi s0, sp, 1020"
