test_cases:
  -
    input:
      bytes: [ 0x0b, 0x95, 0xc5, 0x40 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV32", "CS_MODE_RISCV_XTHEADCONDMOV" ]
    expected:
      insns:
        -
          asm_text: "th.mveqz a0, a1, a2"

  -
    input:
      bytes: [ 0x0b, 0x95, 0xc5, 0x42 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV32", "CS_MODE_RISCV_XTHEADCONDMOV" ]
    expected:
      insns:
        -
          asm_text: "th.mvnez a0, a1, a2"
