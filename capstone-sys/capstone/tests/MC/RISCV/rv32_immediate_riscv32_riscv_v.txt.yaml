      bytes: [ 0x57, 0x34, 0x48, 0x02 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV32", "CS_MODE_RISCV_V" ]
    expected:
      insns:
        -
          asm_text: "vadd.vi v8, v4, -16"

  -
    input:
      bytes: [ 0x57, 0x34, 0x48, 0x72 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV32", "CS_MODE_RISCV_V" ]
    expected:
      insns:
        -
          asm_text: "vmsleu.vi v8, v4, -16"
