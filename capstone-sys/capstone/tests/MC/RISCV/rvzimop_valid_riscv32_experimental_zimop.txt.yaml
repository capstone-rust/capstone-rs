          asm_text: "mop.r.31 a2, a1"

  -
    input:
      bytes: [ 0xf3, 0x46, 0xb6, 0x82 ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV32", "experimental-zimop" ]
    expected:
      insns:
        -
          asm_text: "mop.rr.0 a3, a2, a1"

  -
    input:
      bytes: [ 0xf3, 0x46, 0xb6, 0xce ]
      arch: "CS_ARCH_RISCV"
      options: [ "CS_MODE_RISCV32", "experimental-zimop" ]
    expected:
      insns:
