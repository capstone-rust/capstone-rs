                - type: M68K_OP_REG
                  reg: tt0
            regs_read: [a0]
            regs_write: [tt0]
            regs_impl_read: [a0]
            regs_impl_write: [tt0]

  # --- PMOVE (A0),TT1 : move memory to Transparent Translation Register 1 ---
