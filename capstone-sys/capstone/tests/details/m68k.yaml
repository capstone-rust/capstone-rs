test_cases:
  - input:
      bytes: [0xf6, 0x20, 0x90, 0x00]
      arch: "m68k"
      options: [CS_OPT_DETAIL, CS_MODE_BIG_ENDIAN, CS_MODE_M68K_060]
      address: 0x0
    expected:
      insns:
        - asm_text: "move16 (a0)+, (a1)+"
          details:
            m68k:
              operands:
                - type: M68K_OP_MEM
                  mem:
                    base_reg: a0
                  address_mode: M68K_AM_REGI_ADDR_POST_INC
                - type: M68K_OP_MEM
                  mem:
                    base_reg: a1
                  address_mode: M68K_AM_REGI_ADDR_POST_INC
  - input:
      bytes: [0x06, 0xd0, 0x00, 0x01]
      arch: "m68k"
      options: [CS_OPT_DETAIL, CS_MODE_BIG_ENDIAN, CS_MODE_M68K_020]
      address: 0x0
    expected:
      insns:
        - asm_text: "callm #$1, (a0)"
          details:
            m68k:
              op_size_type: M68K_SIZE_TYPE_CPU
              operands:
                - type: M68K_OP_IMM
                  address_mode: M68K_AM_IMMEDIATE
                  imm: 0x1
                - type: M68K_OP_MEM
                  mem:
                    base_reg: a0
                  address_mode: M68K_AM_REGI_ADDR
            regs_read: [a0]
            regs_impl_read: [a0]
  - input:
      bytes: [0x06, 0xd0]
      arch: "m68k"
      options: [CS_OPT_DETAIL, CS_MODE_BIG_ENDIAN, CS_MODE_M68K_030]
      address: 0x0
    expected:
      insns: []
  - input:
      bytes: [0x06, 0xd0]
      arch: "m68k"
      options: [CS_OPT_DETAIL, CS_MODE_BIG_ENDIAN, CS_MODE_M68K_060]
      address: 0x0
    expected:
      insns: []
  - input:
      bytes: [0x06, 0xc0]
      arch: "m68k"
      options: [CS_OPT_DETAIL, CS_MODE_BIG_ENDIAN, CS_MODE_M68K_020]
      address: 0x0
    expected:
      insns:
        - asm_text: "rtm d0"
          details:
            m68k:
              op_size_type: M68K_SIZE_TYPE_CPU
              operands:
                - type: M68K_OP_REG
                  reg: d0
            groups: [ret, jump]
            regs_write: [d0]
            regs_impl_write: [d0]
  - input:
      bytes: [0x06, 0xc0]
      arch: "m68k"
      options: [CS_OPT_DETAIL, CS_MODE_BIG_ENDIAN, CS_MODE_M68K_030]
      address: 0x0
    expected:
      insns:
        - asm_text: "dc.w $6c0"
  - input:
      bytes: [0x06, 0xc0]
      arch: "m68k"
      options: [CS_OPT_DETAIL, CS_MODE_BIG_ENDIAN, CS_MODE_M68K_060]
      address: 0x0
    expected:
      insns:
        - asm_text: "dc.w $6c0"
  - input:
