          details:
            m68k:
              op_size_type: M68K_SIZE_TYPE_CPU
              operands:
                - type: M68K_OP_REG
                  reg: sfc
                - type: M68K_OP_IMM
                  address_mode: M68K_AM_IMMEDIATE
                - type: M68K_OP_MEM
                  address_mode: M68K_AM_REGI_ADDR
            regs_read: [sfc, a0]
            regs_impl_read: [sfc, a0]

