  # --- PTESTW fc,(ea),#level  (68030) ---
  # From binutils: ptestw, two(0xf000,0x8000), two(0xffc0,0xe3fe), "f3&st8"
  # ext word = 0x8000 | (level<<10) | FC
  # PTESTW SFC,(A0),#7 : ext = 0x8000 | (7<<10) | 0 = 0x9C00
  - input:
      bytes: [0xf0, 0x10, 0x9c, 0x00]
