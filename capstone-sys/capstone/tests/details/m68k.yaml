                  reg: sfc
                - type: M68K_OP_MEM
                  address_mode: M68K_AM_REGI_ADDR
            regs_read: [sfc, a0]
            regs_impl_read: [sfc, a0]

  # --- PLOADR fc,(ea)  (68030) ---
  # From binutils: ploadr, two(0xf000,0x2200), two(0xffc0,0xfffe), "f3&s"
