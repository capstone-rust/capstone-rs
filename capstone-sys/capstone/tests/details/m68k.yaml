              operands:
                - type: M68K_OP_MEM
                  address_mode: M68K_AM_REGI_ADDR

  # --- PFLUSHAN : opcode = 0xF510  (mask FFF8, match F510) ---
  # PFLUSHAN flushes all non-global ATC entries
